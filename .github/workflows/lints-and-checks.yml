name: Lints and Checks
on:
  push:
    branches:
      - master
  pull_request:

jobs:
  basedpyright:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Python Environment
        uses: ./.github/actions/setup-python

      - name: Run BasedPyright
        run: pdm run basedpyright

  prek:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Python Environment
        uses: ./.github/actions/setup-python

      - name: Run Prek
        uses: j178/prek-action@v2
